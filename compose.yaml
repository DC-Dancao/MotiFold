services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: motifold
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d motifold"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-migration:
    build:
      context: ./backend
      target: migration
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: ./backend
      target: prod
    ports:
      - "18000:8000"
    env_file:
      - ./backend/.env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - https_proxy=${https_proxy:-}
      - http_proxy=${http_proxy:-}
      - NO_PROXY=${NO_PROXY:-}
      - no_proxy=${no_proxy:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      target: prod
    env_file:
      - ./backend/.env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - https_proxy=${https_proxy:-}
      - http_proxy=${http_proxy:-}
      - NO_PROXY=${NO_PROXY:-}
      - no_proxy=${no_proxy:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    command: celery -A app.worker:celery_app worker --loglevel=info
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      target: prod
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    command: celery -A app.worker:celery_app beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "13000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
