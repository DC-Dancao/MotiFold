services:
  db-migration:
    build:
      target: dev
    env_file:
      - ./backend/.env
    environment:
      ENV: development
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv

  api:
    build:
      target: dev
    env_file:
      - ./backend/.env
    environment:
      ENV: development
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db-migration:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      target: dev
    env_file:
      - ./backend/.env
    environment:
      ENV: development
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db-migration:
        condition: service_completed_successfully
    command: watchfiles --filter python "celery -A app.worker:celery_app worker --loglevel=info" app

  frontend:
    build:
      context: ./frontend
      target: base
    working_dir: /app
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      PNPM_STORE_DIR: /app/node_modules/.pnpm-store
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev"

volumes:
  backend_venv:
  frontend_node_modules:
